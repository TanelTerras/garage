<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garage</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
  </style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  
  // Initialize OneSignal with explicit paths for your Netlify root layout
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "e0f504df-f825-4182-89dc-779b1454eecc",
      serviceWorkerPath: "OneSignalSDKWorker.js",
      serviceWorkerParam: { scope: "/" }
    });
    
    console.log("OneSignal v16 initialized successfully.");
  });

  // The click handler for your HTML button to wake up iOS permissions
  async function triggerSubscription() {
    console.log("Button clicked, invoking OneSignal...");
    
    window.OneSignalDeferred.push(async function(OneSignal) {
      try {
        // Forces iOS to show the native alert pop-up
        await OneSignal.Notifications.requestPermission();
        console.log("Permission request completed.");
      } catch (error) {
        console.error("OneSignal permission error:", error);
      }
    });
  }
</script>
</head>
<body>
  <h1>Garage</h1>
  <button onclick="triggerSubscription()" style="padding: 15px 25px; font-size: 16px;">
  Enable Garage Alerts
</button>
</body>
</html>
